# Canonical config template for NEW Hermes profiles provisioned via
# scripts/provision-hermes-claw.sh (called from clawadmin).
#
# History:
#   2026-04-20: created. Replaces `hermes profile create --clone` behavior,
#   which cloned the old default (deepseek-chat, providers: {}) and missed
#   the P0.3a docker terminal sandbox. New profiles now start on Huawei MaaS
#   glm-5.1 + docker-sandboxed terminal.
#
# Notes:
#   - deepseek provider intentionally NOT defined here. DEEPSEEK_API_KEY is
#     still present in the process env via /root/.hermes/.env — see Step 1.5.
#   - Huawei MaaS key (HUAWEI_MAAS_API_KEY) is appended to each new profile`s
#     per-profile .env by the provision script.
model:
  default: glm-5.1
  provider: huawei-maas
  base_url: https://api.modelarts-maas.com/v2
providers:
  huawei-maas:
    name: Huawei MaaS
    base_url: https://api.modelarts-maas.com/v2
    key_env: HUAWEI_MAAS_API_KEY
    api_mode: openai_chat
agent:
  max_turns: 30
  verbose: false

# --- 2026-04-20 P0.3a docker terminal backend ---
# OpenClaw sandbox image, --network=none + cgroup limits.
# Hermes built-in security: --cap-drop ALL + no-new-privileges + pids-limit=256
# + tmpfs nosuid/noexec.
terminal:
  backend: docker
  cwd: /workspace
  timeout: 180
  lifetime_seconds: 300
  docker_image: openclaw-sandbox:bookworm-slim
  docker_mount_cwd_to_workspace: false
  network: false
  memory: 256
  cpu: 1.0
